<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register â€“ YOZA Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- Main -->
  <main class="auth-wrapper">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join YOZA and start shopping!</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <a href="login.html" class="auth-tab">Login</a>
        <a href="register.html" class="auth-tab active">Register</a>
      </div>

      <!-- Alert -->
      <div class="alert error" id="errorAlert"></div>
      <div class="alert success" id="successAlert"></div>

      <!-- Social Register -->
      <a href="#" class="social-btn" id="googleBtn">
        <svg class="social-icon" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.1 3.5 29.3 1.5 24 1.5 14.9 1.5 7.1 7.2 3.9 15.1l6.9 5.4C12.4 14 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.1 24.5c0-1.5-.1-3-.4-4.5H24v8.5h12.5c-.5 2.9-2.2 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.5z"/>
          <path fill="#FBBC05" d="M10.8 28.5A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.1.8-4.5L3.4 14C1.9 16.9 1 20.4 1 24s.9 7.1 2.4 10l7.4-5.5z"/>
          <path fill="#34A853" d="M24 46.5c5.3 0 9.8-1.7 13-4.7l-7.1-5.5c-1.9 1.3-4.3 2-5.9 2-6.3 0-11.6-4.3-13.2-10l-6.9 5.4C7.1 40.8 14.9 46.5 24 46.5z"/>
        </svg>
        Continue with Google
      </a>

      <!-- Divider -->
      <div class="divider">or register with email</div>

      <!-- Register Form -->
      <form id="registerForm" novalidate>
        <div class="name-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="First name" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Last name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required />
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <p class="strength-text" id="strengthText"></p>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agreeTerms" required />
          <label for="agreeTerms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="submit-btn">Create Account</button>
      </form>

      <p class="switch-text">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </main>

  <footer>
    Â©2025 YOZA's Store. All rights reserved.
  </footer>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    const passwordInput = document.getElementById('password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    function showAlert(type, message) {
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      if (type === 'error') {
        errorAlert.textContent = message;
        errorAlert.style.display = 'block';
      } else {
        successAlert.textContent = message;
        successAlert.style.display = 'block';
      }
    }

    function checkPasswordStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const levels = [
        { width: '0%',   color: '#e0d5d0', label: '' },
        { width: '25%',  color: '#e57373', label: 'Weak' },
        { width: '50%',  color: '#ffb74d', label: 'Fair' },
        { width: '75%',  color: '#81c784', label: 'Good' },
        { width: '100%', color: '#4caf50', label: 'Strong' },
      ];

      const level = password.length === 0 ? levels[0] : levels[score];
      strengthFill.style.width = level.width;
      strengthFill.style.background = level.color;
      strengthText.textContent = level.label;
    }

    passwordInput.addEventListener('input', function () {
      checkPasswordStrength(this.value);
    });

    registerForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;

      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        showAlert('error', 'âš ď¸Ź Please fill in all required fields.');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert('error', 'âš ď¸Ź Please enter a valid email address.');
        return;
      }

      if (password.length < 6) {
        showAlert('error', 'âš ď¸Ź Password must be at least 6 characters long.');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('error', 'âťŚ Passwords do not match.');
        return;
      }

      if (!agreeTerms) {
        showAlert('error', 'âš ď¸Ź Please agree to the Terms & Conditions.');
        return;
      }

      // Check if email already exists
      const users = JSON.parse(localStorage.getItem('yoza_users')) || [];
      if (users.find(u => u.email === email)) {
        showAlert('error', 'âťŚ An account with this email already exists.');
        return;
      }

      // Save user
      users.push({ name: `${firstName} ${lastName}`, email, phone, password });
      localStorage.setItem('yoza_users', JSON.stringify(users));

      // Auto login
      localStorage.setItem('yoza_session', JSON.stringify({ name: `${firstName} ${lastName}`, email }));

      showAlert('success', `âś… Account created! Welcome to YOZA, ${firstName}! Redirecting...`);
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1800);
    });

    document.getElementById('googleBtn').addEventListener('click', function (e) {
      e.preventDefault();
      showAlert('error', 'âš ď¸Ź Google login is not configured yet.');
    });
  </script>
</body>
</html>
